<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CLAOS OS Hardened AI-First Architecture</title>
  <desc id="desc">Diagram showing secure boot, immutable root, gateway sandboxing, local Ollama model, and optional cloud APIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1325"/>
      <stop offset="1" stop-color="#102D45"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F1F33"/>
      <stop offset="1" stop-color="#153450"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.25" flood-color="#000"/>
    </filter>
    <style>
      .h1 { font: 700 56px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #F2F8FF; }
      .h2 { font: 600 26px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #D3E8FF; }
      .body { font: 500 20px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #B6D7F7; }
      .chip { font: 600 16px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #E9F4FF; }
      .small { font: 500 14px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #9FC7EA; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1110" cy="80" r="220" fill="#184A70" opacity="0.28"/>
  <circle cx="150" cy="580" r="200" fill="#1A5E85" opacity="0.22"/>

  <text x="72" y="98" class="h1">CLAOS OS v1</text>
  <text x="72" y="140" class="h2">Hardened AI-First Linux Distribution</text>

  <g filter="url(#shadow)">
    <rect x="72" y="178" rx="16" ry="16" width="340" height="172" fill="url(#panel)" stroke="#3D78A8"/>
    <text x="96" y="218" class="h2">Boot + Storage</text>
    <text x="96" y="254" class="body">Secure Boot + TPM</text>
    <text x="96" y="286" class="body">LUKS2 FDE (default)</text>
    <text x="96" y="318" class="body">Immutable root + A/B</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="178" rx="16" ry="16" width="340" height="172" fill="url(#panel)" stroke="#3D78A8"/>
    <text x="454" y="218" class="h2">Runtime Isolation</text>
    <text x="454" y="254" class="body">Sandboxed agents</text>
    <text x="454" y="286" class="body">AppArmor + seccomp</text>
    <text x="454" y="318" class="body">Default deny networking</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="788" y="178" rx="16" ry="16" width="340" height="172" fill="url(#panel)" stroke="#3D78A8"/>
    <text x="812" y="218" class="h2">Inference Policy</text>
    <text x="812" y="254" class="body">Default local model</text>
    <text x="812" y="286" class="body">Sensitive data local-only</text>
    <text x="812" y="318" class="body">Optional cloud APIs</text>
  </g>

  <path d="M412 264H430" stroke="#8BC8FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M770 264H788" stroke="#8BC8FF" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="72" y="382" rx="16" ry="16" width="1056" height="166" fill="#0C1B2D" stroke="#3D78A8"/>
    <text x="96" y="422" class="h2">Default Agent Stack</text>

    <rect x="96" y="444" rx="10" ry="10" width="250" height="44" fill="#1D4E76"/>
    <text x="112" y="472" class="chip">claos agent (autonomous)</text>

    <rect x="364" y="444" rx="10" ry="10" width="236" height="44" fill="#1D4E76"/>
    <text x="380" y="472" class="chip">ollama/qwen3:4b</text>

    <rect x="618" y="444" rx="10" ry="10" width="196" height="44" fill="#1D4E76"/>
    <text x="634" y="472" class="chip">Tool sandbox</text>

    <rect x="832" y="444" rx="10" ry="10" width="272" height="44" fill="#1D4E76"/>
    <text x="848" y="472" class="chip">Bring-your-own API keys</text>

    <text x="96" y="522" class="small">Privacy by default. Telemetry off until explicit opt-in.</text>
  </g>
</svg>
